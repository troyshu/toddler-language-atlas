activities:
  - id: act.photo_point.v1
    title: Photo Point
    activity_type: photo_choice
    target_skill_ids:
      primary: [vocab.familiar_nouns.v1]
      secondary: [questions.what_object.v1]
    child_ui:
      max_choices: 4
      uses_text: false
      uses_parent_voice: true
      feedback_style: neutral_parent_led
    required_assets:
      - type: image
        semantic_tags: [object, person, animal, food, toy]
    session_rules:
      min_items: 2
      max_items: 6
      stop_on_frustration: true
      no_timers: true
      no_streaks: true

  - id: act.put_it_somewhere.v1
    title: Put It Somewhere
    activity_type: parent_led_direction
    target_skill_ids:
      primary: [concept.prepositions.in_on_under.v1]
      secondary: [receptive.one_step.v1, questions.where.v1]
    child_ui:
      max_choices: 0
      uses_text: false
      uses_parent_voice: true
      feedback_style: parent_observation
    required_assets:
      - type: real_object
        semantic_tags: [toy, container, furniture]
    session_rules:
      min_items: 2
      max_items: 5
      stop_on_frustration: true
      no_timers: true
      no_streaks: true

  - id: act.category_baskets.v1
    title: Category Baskets
    activity_type: sort_into_bins
    target_skill_ids:
      primary: [concept.categories.basic.v1]
      secondary: [vocab.familiar_nouns.v1, questions.which_choice.v1]
    child_ui:
      max_choices: 3
      uses_text: false
      uses_parent_voice: true
      feedback_style: playful
    required_assets:
      - type: image
        semantic_tags: [food, animal, clothing, toy, vehicle]
    session_rules:
      min_items: 4
      max_items: 8
      stop_on_frustration: true
      no_timers: true
      no_streaks: true

  - id: act.story_snaps.v1
    title: Story Snaps
    activity_type: photo_sequence_talk
    target_skill_ids:
      primary: [narrative.picture_event_seed.v1]
      secondary: [vocab.verbs.common_actions.v1, questions.where.v1]
    child_ui:
      max_choices: 4
      uses_text: false
      uses_parent_voice: true
      feedback_style: parent_conversation
    required_assets:
      - type: image
        semantic_tags: [event, person, place, action]
    session_rules:
      min_items: 1
      max_items: 4
      stop_on_frustration: true
      no_timers: true
      no_streaks: true

