simulation_profiles:
  - id: sim.age_typical_uneven_vocab
    description: Age-typical 2-year-old with uneven vocabulary breadth.
    mastered: [engagement.shared_attention.v1, receptive.one_step.v1]
    emerging: [vocab.familiar_nouns.v1, vocab.foods.v1, vocab.clothing.v1]
    blocked_or_deferred: [phonics.simple_decoding.v1]
    expected_frontier:
      - concept.categories.basic.v1
      - questions.what_object.v1
      - vocab.foods.v1
    expected_activity: act.category_baskets.v1
    invariant: Must broaden semantics instead of jumping to letters or phonics.

  - id: sim.advanced_vocab_weak_prepositions
    description: Verbally advanced toddler with weaker directions/prepositions.
    mastered: [vocab.familiar_nouns.v1, vocab.verbs.common_actions.v1, expressive.two_word_combo.v1]
    emerging: [concept.prepositions.in_on_under.v1, receptive.two_step_related.v1, questions.where.v1]
    blocked_or_deferred: []
    expected_frontier:
      - concept.prepositions.in_on_under.v1
      - receptive.two_step_related.v1
    expected_activity: act.put_it_somewhere.v1
    invariant: Must not assume expressive vocabulary implies receptive spatial mastery.

  - id: sim.strong_receptive_limited_expressive
    description: Strong receptive language but limited expressive speech.
    mastered: [vocab.familiar_nouns.v1, receptive.one_step.v1]
    emerging: [expressive.two_word_combo.v1, questions.what_object.v1]
    blocked_or_deferred: []
    expected_frontier:
      - expressive.two_word_combo.v1
      - questions.which_choice.v1
    expected_activity: act.photo_point.v1
    invariant: Must accept pointing/action as comprehension evidence.

  - id: sim.screen_only_success
    description: Performs well in-game but fails to generalize off-screen.
    mastered: []
    emerging: [vocab.familiar_nouns.v1]
    blocked_or_deferred: []
    expected_frontier:
      - real_world.object_find.v1
      - concept.categories.basic.v1
    expected_activity: act.put_it_somewhere.v1
    invariant: Must recommend off-screen generalization instead of more identical app trials.

  - id: sim.early_letters_weak_oral
    description: Knows many letters early but has weaker oral language or phonological awareness.
    mastered: [print.letter_names.v1]
    emerging: [vocab.verbs.common_actions.v1, soundplay.rhyme_exposure.v1, concept.categories.basic.v1]
    blocked_or_deferred: [phonics.simple_decoding.v1]
    expected_frontier:
      - soundplay.rhyme_exposure.v1
      - vocab.verbs.common_actions.v1
      - concept.categories.basic.v1
    expected_activity: act.story_snaps.v1
    invariant: Letter knowledge alone must not unlock decoding.

  - id: sim.older_preschool_phonological_ready
    description: Older preschool learner ready for rhyme, syllables, beginning sounds, and early letter-sound links.
    mastered:
      - questions.what_action.v1
      - narrative.first_then.v1
      - soundplay.rhyme_recognition.v1
      - soundplay.syllable_beats.v1
      - print.letter_names.v1
    emerging:
      - soundplay.beginning_sound_noticing.v1
      - print.letter_sound_links.v1
    blocked_or_deferred: []
    expected_frontier:
      - soundplay.beginning_sound_noticing.v1
      - print.letter_sound_links.v1
    expected_activity: act.sound_play_parade.v1
    invariant: May approach letter-sound links only after oral language and sound-play evidence.
