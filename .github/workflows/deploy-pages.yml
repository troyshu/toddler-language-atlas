name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run tests
        working-directory: app
        run: npm test

      - name: Build site
        working-directory: app
        env:
          VITE_PEXELS_API_KEY: ${{ secrets.VITE_PEXELS_API_KEY || secrets.PEXELS_API_KEY || vars.VITE_PEXELS_API_KEY || vars.PEXELS_API_KEY }}
          VITE_PIXABAY_API_KEY: ${{ secrets.VITE_PIXABAY_API_KEY || secrets.PIXABAY_API_KEY || vars.VITE_PIXABAY_API_KEY || vars.PIXABAY_API_KEY }}
        run: npm run build -- --base=/toddler-language-atlas/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
